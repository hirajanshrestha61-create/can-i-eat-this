<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>footballworldcup.store | World Cup 2026 Countdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 10%, #0b2b1f, #02100a);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      background-attachment: fixed;
    }

    /* animated football field background */
    .field-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        repeating-linear-gradient(0deg, 
          rgba(30, 100, 50, 0.25) 0px, 
          rgba(30, 100, 50, 0.25) 40px,
          rgba(22, 80, 40, 0.25) 40px,
          rgba(22, 80, 40, 0.25) 80px);
      z-index: 0;
      pointer-events: none;
    }

    .circle-pattern {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vmin;
      height: 70vmin;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 80px rgba(0, 200, 100, 0.3);
      animation: rotateCircle 30s infinite linear;
    }

    @keyframes rotateCircle {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .main-container {
      position: relative;
      z-index: 20;
      width: 90%;
      max-width: 1000px;
      backdrop-filter: blur(18px);
      background: rgba(0, 20, 10, 0.55);
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 6rem 2rem 6rem 2rem;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(255, 200, 0, 0.3), inset 0 0 60px rgba(0, 200, 80, 0.3);
      text-align: center;
      transition: all 0.3s ease;
      animation: floatGlow 4s infinite alternate ease-in-out;
    }

    @keyframes floatGlow {
      0% { box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 15px rgba(255, 215, 0, 0.5); }
      100% { box-shadow: 0 35px 65px rgba(0,0,0,0.9), 0 0 35px rgba(255, 215, 0, 0.8); }
    }

    .domain-badge {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #f5e56c;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 20px #ffb300, 0 0 5px black;
      word-break: break-word;
      background: rgba(0,0,0,0.4);
      display: inline-block;
      padding: 0.3rem 1.8rem;
      border-radius: 3rem;
      border: 1px solid gold;
      backdrop-filter: blur(5px);
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      color: #fff9e6;
      text-transform: uppercase;
      line-height: 1.2;
      margin: 0.8rem 0 0.2rem;
      text-shadow: 3px 3px 0 #0a3f1f, 6px 6px 0 rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #ffd966;
      font-weight: 500;
      margin-bottom: 1rem;
      background: rgba(0, 30, 10, 0.7);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid #b8860b;
    }

    /* Hourglass animation container */
    .hourglass-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem 0 1.5rem;
      position: relative;
    }

    .hourglass {
      width: 70px;
      height: 100px;
      position: relative;
      filter: drop-shadow(0 0 18px #e6b422);
    }

    .glass-top, .glass-bottom {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 35px solid transparent;
      border-right: 35px solid transparent;
      left: 0;
    }

    .glass-top {
      border-bottom: 45px solid rgba(240, 230, 140, 0.9);
      top: 0;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    .glass-bottom {
      border-top: 45px solid rgba(245, 245, 200, 0.9);
      bottom: 0;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .sand-stream {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      background: linear-gradient(180deg, #e6b422, #b8860b);
      top: 38px;
      height: 24px;
      animation: sandFlow 0.8s infinite linear;
      border-radius: 2px;
      box-shadow: 0 0 12px gold;
    }

    @keyframes sandFlow {
      0% { opacity: 0.7; height: 18px; top: 38px; }
      50% { opacity: 1; height: 28px; top: 36px; }
      100% { opacity: 0.7; height: 18px; top: 38px; }
    }

    .sand-pile {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background: radial-gradient(circle, #f0c45a, #b57c1c);
      border-radius: 50%;
      box-shadow: 0 0 22px #ffbf00;
      animation: pileGlow 1.2s infinite alternate;
    }

    @keyframes pileGlow {
      from { box-shadow: 0 0 15px #daa520; }
      to { box-shadow: 0 0 30px #ffd700; }
    }

    /* countdown grid */
    .countdown {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem 1.8rem;
      margin: 1.5rem 0 2rem;
    }

    .time-block {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(15px);
      border: 2px solid #d4af37;
      border-radius: 2.5rem 1rem 2.5rem 1rem;
      padding: 1.2rem 1rem;
      min-width: 110px;
      box-shadow: 0 0 30px rgba(255, 200, 0, 0.4), inset 0 0 15px rgba(0,255,100,0.4);
      transform: skewX(-2deg);
      transition: transform 0.2s;
    }

    .time-block:hover {
      transform: skewX(-2deg) scale(1.05);
      border-color: #ffd700;
    }

    .number {
      font-size: 3.5rem;
      font-weight: 800;
      color: #f7e358;
      text-shadow: 0 0 25px #ffaa00, 0 0 10px black;
      line-height: 1;
      letter-spacing: 2px;
    }

    .label {
      font-size: 1rem;
      font-weight: 600;
      color: #ddd;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .separator {
      font-size: 3rem;
      font-weight: bold;
      color: #ffcc66;
      text-shadow: 0 0 15px gold;
      margin: 0 -0.5rem;
    }

    .location {
      font-size: 1.2rem;
      background: rgba(255,255,200,0.15);
      color: #f0e68c;
      padding: 0.5rem 1.8rem;
      border-radius: 3rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0 1.5rem;
      font-weight: 500;
      border: 1px dashed #ffd700;
    }

    .football-animation {
      position: relative;
      height: 60px;
      margin: 0.5rem 0 1rem;
    }

    .ball {
      font-size: 3rem;
      position: absolute;
      left: 10%;
      animation: dribbleBall 3s infinite ease-in-out;
      filter: drop-shadow(0 10px 15px black);
    }

    @keyframes dribbleBall {
      0% { left: 10%; top: -5px; transform: rotate(0deg); }
      25% { top: 15px; transform: rotate(120deg); }
      50% { left: 80%; top: -8px; transform: rotate(240deg); }
      75% { top: 18px; transform: rotate(340deg); }
      100% { left: 10%; top: -5px; transform: rotate(360deg); }
    }

    /* Social share section */
    .share-section {
      margin: 1.2rem 0 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .share-title {
      color: #ffd966;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
      font-size: 1.1rem;
      text-shadow: 0 0 8px black;
    }

    .social-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .social-btn {
      background: rgba(20, 20, 15, 0.8);
      backdrop-filter: blur(12px);
      border: 1.5px solid #d4af37;
      color: #f5e56c;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
      letter-spacing: 0.5px;
    }

    .social-btn:hover {
      background: #d4af37;
      color: #0a2f1a;
      border-color: #fff;
      box-shadow: 0 0 30px gold;
      transform: translateY(-3px);
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 0.8rem 0 0.3rem;
      font-size: 2rem;
      filter: drop-shadow(0 0 15px gold);
      animation: twinkle 1.5s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.7; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .footer-note {
      color: #ccbb88;
      margin-top: 0.8rem;
      font-size: 1rem;
      font-style: italic;
      border-top: 1px solid rgba(255,215,0,0.3);
      padding-top: 1rem;
    }

    @media (max-width: 600px) {
      .time-block {
        min-width: 75px;
        padding: 0.8rem 0.4rem;
      }
      .number {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
<div class="field-bg"></div>
<div class="circle-pattern"></div>

<div class="main-container">
  <div class="domain-badge">⚽ footballworldcup.store</div>
  <h1>FIFA WORLD CUP 26</h1>
  <div class="subtitle">🇺🇸 USA · 🇲🇽 MEXICO · 🇨🇦 CANADA</div>

  <!-- Hourglass Animation -->
  <div class="hourglass-container">
    <div class="hourglass">
      <div class="glass-top"></div>
      <div class="glass-bottom"></div>
      <div class="sand-stream"></div>
      <div class="sand-pile"></div>
    </div>
  </div>

  <!-- Countdown Timer -->
  <div class="countdown" id="countdown">
    <div class="time-block">
      <div class="number" id="days">00</div>
      <div class="label">Days</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="number" id="hours">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="separator">:</div>
    <div class="time-block">
      <div class="number" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="location">
    <span>📍 Kick-off: June 11, 2026</span>
  </div>

  <!-- Animated football -->
  <div class="football-animation">
    <span class="ball">⚽</span>
  </div>

  <!-- Social Share Buttons -->
  <div class="share-section">
    <div class="share-title">📢 Share the countdown</div>
    <div class="social-buttons">
      <!-- Twitter share -->
      <a class="social-btn" id="twitterShare" href="#" target="_blank" rel="noopener">
        <span>🐦</span> Twitter
      </a>
      <!-- Facebook share -->
      <a class="social-btn" id="facebookShare" href="#" target="_blank" rel="noopener">
        <span>📘</span> Facebook
      </a>
      <!-- WhatsApp share -->
      <a class="social-btn" id="whatsappShare" href="#" target="_blank" rel="noopener">
        <span>💬</span> WhatsApp
      </a>
      <!-- Copy link button -->
      <button class="social-btn" id="copyLinkBtn">
        <span>🔗</span> Copy Link
      </button>
    </div>
  </div>

  <div class="stars">
    <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
  </div>

  <div class="footer-note">
    The greatest show on Earth is coming. Be ready.
  </div>
</div>

<script>
  (function() {
    // ---------- COUNTDOWN LOGIC ----------
    const targetDate = new Date('2026-06-11T12:00:00Z'); // June 11, 2026 12:00 UTC

    function updateCountdown() {
      const now = new Date();
      const difference = targetDate - now;

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      if (difference <= 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        const subtitle = document.querySelector('.subtitle');
        if (subtitle) subtitle.textContent = '⚽ THE WORLD CUP IS LIVE! ⚽';
        return;
      }

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      daysEl.textContent = days < 10 ? '0' + days : days;
      hoursEl.textContent = hours < 10 ? '0' + hours : hours;
      minutesEl.textContent = minutes < 10 ? '0' + minutes : minutes;
      secondsEl.textContent = seconds < 10 ? '0' + seconds : seconds;

      // subtle glow effect on second change
      if (seconds % 10 === 0) {
        const blocks = document.querySelectorAll('.time-block');
        blocks.forEach(b => {
          b.style.borderColor = '#ffbf00';
          setTimeout(() => { b.style.borderColor = '#d4af37'; }, 180);
        });
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ---------- SOCIAL SHARE SETUP ----------
    const pageUrl = encodeURIComponent('https://footballworldcup.store');
    const shareText = encodeURIComponent('⚽ Countdown to FIFA World Cup 2026! Join me on footballworldcup.store and get ready for the biggest tournament. 🌍🏆');

    // Twitter
    document.getElementById('twitterShare').href = 
      `https://twitter.com/intent/tweet?text=${shareText}&url=${pageUrl}&hashtags=WorldCup2026,Football`;

    // Facebook
    document.getElementById('facebookShare').href = 
      `https://www.facebook.com/sharer/sharer.php?u=${pageUrl}&quote=${shareText}`;

    // WhatsApp
    document.getElementById('whatsappShare').href = 
      `https://api.whatsapp.com/send?text=${shareText}%20${pageUrl}`;

    // Copy link button
    document.getElementById('copyLinkBtn').addEventListener('click', function(e) {
      const urlToCopy = 'https://footballworldcup.store';
      navigator.clipboard.writeText(urlToCopy).then(() => {
        const originalText = this.innerHTML;
        this.innerHTML = '<span>✅</span> Copied!';
        this.style.background = '#2e6b2e';
        setTimeout(() => {
          this.innerHTML = originalText;
          this.style.background = '';
        }, 2000);
      }).catch(() => {
        alert('Copy manually: ' + urlToCopy);
      });
    });

    // ---------- FLOATING GOLD PARTICLES (decorative) ----------
    function createParticle() {
      const particle = document.createElement('div');
      particle.style.position = 'fixed';
      particle.style.zIndex = '2';
      particle.style.pointerEvents = 'none';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.width = '6px';
      particle.style.height = '6px';
      particle.style.background = 'rgba(255, 215, 0, 0.7)';
      particle.style.borderRadius = '50%';
      particle.style.boxShadow = '0 0 15px gold';
      particle.style.animation = `floatParticle ${3 + Math.random() * 5}s linear forwards`;
      document.body.appendChild(particle);
      setTimeout(() => { if(particle) particle.remove(); }, 6000);
    }

    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes floatParticle {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
      }
    `;
    document.head.appendChild(styleSheet);
    setInterval(createParticle, 800);
  })();
</script>
</body>
</html>
